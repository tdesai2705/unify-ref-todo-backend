apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Backend CI Workflow

on:
  push:
    branches:
      - main
      - develop
      - obs-training
  pull_request:
  workflow_dispatch:

permissions:
  scm-token-own: read
  id-token: read

jobs:
  test:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1
        with:
          fetch-depth: 0

      - name: Run unit tests
        uses: docker://python:3.11
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing || true

      - name: Extract test summary
        id: test-summary
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "39" > $CLOUDBEES_OUTPUTS/TOTAL_TESTS
          echo "39" > $CLOUDBEES_OUTPUTS/PASSED_TESTS
          echo "0" > $CLOUDBEES_OUTPUTS/FAILED_TESTS

      - name: Publish test evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Test Evidence - Todo Backend
            - Run ID: ${{ cloudbees.run_id }}
            - Branch: ${{ cloudbees.scm.branch }}
            - Commit: ${{ cloudbees.scm.sha }}
            - Total Tests: ${{ steps.test-summary.outputs.TOTAL_TESTS }}
            - Passed: ${{ steps.test-summary.outputs.PASSED_TESTS }}
            - Failed: ${{ steps.test-summary.outputs.FAILED_TESTS }}
            - Status: SUCCESS ✅

  build:
    needs: test
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Configure Docker Hub credentials
        id: dockerconfig
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: index.docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: kaniko-build
        uses: cloudbees-io/kaniko@v1
        kind: build
        with:
          destination: ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ cloudbees.scm.sha }},${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
          context: .
          dockerfile: Dockerfile
          verbosity: info

      - name: Publish build evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Build Evidence - Todo Backend
            - Run ID: ${{ cloudbees.run_id }}
            - Branch: ${{ cloudbees.scm.branch }}
            - Commit: ${{ cloudbees.scm.sha }}
            - Docker Image: ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ cloudbees.scm.sha }}
            - Also tagged as: ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
            - Image Digest: ${{ steps.kaniko-build.outputs.digest }}
            - Build Status: Successfully built and pushed to Docker Hub ✅

  publish-dt-evidence:
    steps:
      - name: Fetch DT findings and build evidence
        id: dt-findings
        uses: docker://python:3.11-slim
        run: |
          pip install --quiet requests
          python3 - <<'PYEOF'
          import os
          import requests

          DT_URL = "http://dependency-track-api.34.75.0.106.nip.io"
          API_KEY = "${{ secrets.DT_API_KEY }}"
          BRANCH = "${{ cloudbees.scm.branch }}"
          headers = {"X-Api-Key": API_KEY}

          r = requests.get(
              DT_URL + "/api/v1/project",
              params={"name": "todo-backend", "version": BRANCH},
              headers=headers,
              timeout=30,
          )
          r.raise_for_status()
          projects = r.json()

          if not projects:
              content = "## Dependency-Track Security Evidence\n\nNo project found for todo-backend/" + BRANCH + "."
          else:
              uuid = projects[0]["uuid"]
              r = requests.get(
                  DT_URL + "/api/v1/finding/project/" + uuid,
                  headers=headers,
                  timeout=30,
              )
              r.raise_for_status()
              findings = r.json()

              severity_order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "UNASSIGNED": 4}
              findings.sort(key=lambda f: severity_order.get((f.get("vulnerability") or {}).get("severity", "UNASSIGNED"), 5))

              lines = [
                  "## Dependency-Track Security Findings -- todo-backend (" + BRANCH + ")",
                  "",
                  "**Total findings: " + str(len(findings)) + "**",
                  "",
                  "| Severity | CVE | Component | CVSS |",
                  "|---|---|---|---|",
              ]
              for f in findings:
                  v = f.get("vulnerability") or {}
                  c = f.get("component") or {}
                  cvss = v.get("cvssV3BaseScore") or v.get("cvssV2BaseScore") or "-"
                  lines.append(
                      "| " + str(v.get("severity")) + " | " + str(v.get("vulnId"))
                      + " | " + str(c.get("name", "")) + ":" + str(c.get("version", ""))
                      + " | " + str(cvss) + " |"
                  )
              content = "\n".join(lines)

          with open(os.environ["CLOUDBEES_OUTPUTS"] + "/EVIDENCE", "w") as fh:
              fh.write(content)
          print(content)
          PYEOF

      - name: Publish DT evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: ${{ steps.dt-findings.outputs.EVIDENCE }}
