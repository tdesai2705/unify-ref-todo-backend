apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Backend Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

env:
  DOCKER_IMAGE: tejasdesai27/todo-backend
  DOCKER_TAG: ${{ cloudbees.scm.sha }}

jobs:
  build:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Configure Docker credentials
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: cloudbees-io/docker-build-push@v1
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Generate build evidence
        uses: cloudbees-io/generate-evidence@v1
        with:
          artifact-name: backend-image
          artifact-version: ${{ env.DOCKER_TAG }}
          artifact-type: docker-image
