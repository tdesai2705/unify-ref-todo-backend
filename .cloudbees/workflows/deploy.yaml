apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Deploy Backend

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      environment:
        type: string
        required: true
    secrets:
      GITHUB_PAT:
        required: true

jobs:
  deploy:
    steps:
      - name: Update infra repo image tag
        uses: docker://alpine/git:latest
        shell: sh
        run: |
          git clone https://${{ secrets.GITHUB_PAT }}@github.com/tdesai2705/unify-ref-todo-infrastructure.git infra
          cd infra

          VALUES_FILE="helm/todo-app/envs/${{ inputs.environment }}/backend-values.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "No values file for environment '${{ inputs.environment }}' at $VALUES_FILE"
            exit 1
          fi

          awk -v tag="${{ inputs.artifact-id }}" '{if(/^[[:space:]]*tag:/) printf "    tag: %s\n", tag; else print}' "$VALUES_FILE" > /tmp/updated.yaml
          mv /tmp/updated.yaml "$VALUES_FILE"
          echo "Updated $VALUES_FILE:"
          cat "$VALUES_FILE"

          git config user.email "ci@cloudbees.com"
          git config user.name "CloudBees CI"
          git add "$VALUES_FILE"
          git commit -m "Deploy backend:${{ inputs.artifact-id }} to ${{ inputs.environment }} [skip ci]" || echo "No changes to commit"

          TARGET_BRANCH=main
          for i in 1 2 3; do
            git pull --rebase origin "$TARGET_BRANCH" && git push "https://${{ secrets.GITHUB_PAT }}@github.com/tdesai2705/unify-ref-todo-infrastructure.git" "$TARGET_BRANCH" && break
            sleep 5
          done

      - name: Map environment name
        id: map-env
        uses: docker://alpine:latest
        shell: sh
        run: |
          case "${{ inputs.environment }}" in
            dev) UNIFY_ENV="dev-todo" ;;
            qa) UNIFY_ENV="qa-todo" ;;
            prod) UNIFY_ENV="prod-todo" ;;
            *) echo "Unknown environment: ${{ inputs.environment }}"; exit 1 ;;
          esac
          printf '%s' "$UNIFY_ENV" > $CLOUDBEES_OUTPUTS/UNIFY_ENV

      - name: Register backend deployment
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.artifact-id }}
          target-environment: ${{ steps.map-env.outputs.UNIFY_ENV }}

      - name: Publish deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Backend Deployed ✅
            - Artifact ID: ${{ inputs.artifact-id }}
            - Environment: ${{ inputs.environment }}
            - Run ID: ${{ cloudbees.run_id }}
