apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Release to Production

on:
  workflow_dispatch:

permissions:
  scm-token-own: read
  id-token: read

jobs:
  promote-to-prod:
    environment: prod-todo
    steps:
      - name: Checkout infra repo
        uses: docker://alpine/git:latest
        shell: sh
        run: |
          git clone https://${{ secrets.GITHUB_PAT }}@github.com/tdesai2705/unify-ref-todo-infrastructure.git infra

      - name: Read QA image tags
        id: read-tags
        uses: docker://alpine:latest
        shell: sh
        run: |
          BACKEND_TAG=$(grep 'tag:' infra/helm/todo-app/envs/qa/backend-values.yaml | awk '{print $2}')
          FRONTEND_TAG=$(grep 'tag:' infra/helm/todo-app/envs/qa/frontend-values.yaml | awk '{print $2}')
          echo "Backend tag from QA : $BACKEND_TAG"
          echo "Frontend tag from QA: $FRONTEND_TAG"
          echo "$BACKEND_TAG" > $CLOUDBEES_OUTPUTS/BACKEND_TAG
          echo "$FRONTEND_TAG" > $CLOUDBEES_OUTPUTS/FRONTEND_TAG

      - name: Publish pre-deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Release to Production — Approval Granted
            - Backend image: tejasdesai27/todo-backend:${{ steps.read-tags.outputs.BACKEND_TAG }}
            - Frontend image: tejasdesai27/todo-frontend:${{ steps.read-tags.outputs.FRONTEND_TAG }}
            - Promoting from: qa-todo-app → prod-todo-app
            - Run ID: ${{ cloudbees.run_id }}

      - name: Update prod helm values
        uses: docker://alpine:latest
        shell: sh
        run: |
          BACKEND_TAG="${{ steps.read-tags.outputs.BACKEND_TAG }}"
          FRONTEND_TAG="${{ steps.read-tags.outputs.FRONTEND_TAG }}"
          sed -i "s/tag: .*/tag: ${BACKEND_TAG}/" infra/helm/todo-app/envs/prod/backend-values.yaml
          sed -i "s/tag: .*/tag: ${FRONTEND_TAG}/" infra/helm/todo-app/envs/prod/frontend-values.yaml
          echo "prod/backend-values.yaml:"
          cat infra/helm/todo-app/envs/prod/backend-values.yaml
          echo "prod/frontend-values.yaml:"
          cat infra/helm/todo-app/envs/prod/frontend-values.yaml

      - name: Commit and push to infra repo
        uses: docker://alpine/git:latest
        shell: sh
        run: |
          cd infra
          git config user.email "ci@cloudbees.com"
          git config user.name "CloudBees CI"
          git add helm/todo-app/envs/prod/backend-values.yaml helm/todo-app/envs/prod/frontend-values.yaml
          git commit -m "Promote backend:${{ steps.read-tags.outputs.BACKEND_TAG }} + frontend:${{ steps.read-tags.outputs.FRONTEND_TAG }} to prod [skip ci]" || echo "No changes to commit"
          git push https://${{ secrets.GITHUB_PAT }}@github.com/tdesai2705/unify-ref-todo-infrastructure.git main

      - name: Publish deployment evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Production Deployment Complete ✅
            - Backend: tejasdesai27/todo-backend:${{ steps.read-tags.outputs.BACKEND_TAG }}
            - Frontend: tejasdesai27/todo-frontend:${{ steps.read-tags.outputs.FRONTEND_TAG }}
            - Infra repo updated — ArgoCD syncing to prod-todo-app namespace
            - URL: http://todo-app-prod.34.75.0.106.nip.io/todos
